# DATA
classes: 16
modality: CT

# MODEL
arch: swin_unet          
spatial_dims: 2          
in_chans: 1            
embed_dim: 96            
window_size: [7, 7]      
patch_size: [4, 4]      
depths: [2, 2, 2, 2]     
num_heads: [3, 6, 12, 24] 

mlp_ratio: 4.0
qkv_bias: True
drop_rate: 0.0
attn_drop_rate: 0.0
drop_path_rate: 0.2      

# Normalización
patch_norm: True
use_checkpoint: False

# TRAIN
epochs: 150
roi_size: [512, 512]    
batch_size: 24          # Transformers use to much VRAM, begin with less batch size  
start_epoch: 0
num_workers: 24      

optimizer: adamw
base_lr: 0.0001          
weight_decay: 0.05       
betas: [0.9, 0.999]

# AUGMENTATION
scale: [0.8, 1.2]
rotate: 15
translate: [0.1, 0.1]
gaussian_noise_std: 0.02
additive_brightness_std: 0.7
gamma_range: [0.5, 1.6]

# VALIDATION & SYSTEM
val_freq: 5     
print_freq: 10
reproduce_seed: 2023